name: MCP Full-Memory Governance Repair

on:
  push:
    paths:
      - ".github/workflows/mcp-governance-repair.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  repair-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/mcp-full-memory-governance
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply governance repair
        run: python scripts/apply_mcp_governance_fix.py

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run targeted MCP tests
        run: |
          python -m pytest -q \
            tests/test_memory_service_interface_edges.py \
            tests/test_connect_module_and_mcp_server_helpers.py \
            tests/test_connect_stdio_server.py

      - name: Compile repaired modules
        run: |
          python -m compileall -q \
            src/ms8/connect/mcp_server/memory_access_policy.py \
            src/ms8/connect/mcp_server/memory_service_interface.py \
            src/ms8/connect/mcp_server/mcp_server.py \
            src/ms8/connect/mcp_server/stdio_server.py

      - name: Commit validated repair
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_mcp_governance_fix.py
          rm -f .github/workflows/mcp-governance-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(mcp): enforce governed full-memory reads"
          git push origin HEAD:fix/mcp-full-memory-governance
