name: Second batch diagnostic

on:
  push:
    branches:
      - "release/second-batch-0.2.16"
      - "rc-v0.2.16"

permissions:
  contents: read

concurrency:
  group: second-batch-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  first-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install test environment
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Run until first failure
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q -x --tb=short 2>&1 | tee second-batch-pytest.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: second-batch-pytest-log-${{ github.sha }}
          path: second-batch-pytest.log
          if-no-files-found: warn
          retention-days: 3
