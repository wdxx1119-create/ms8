name: Contract diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  locate-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate repository contract assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          needles = (
              "candidate/v0.2.14",
              "ms8-v0.2.14",
              "dist/ms8-0.2.14",
              "master",
              "coverage enforcement workflow",
              "pytest coverage",
              "GitHub Discussions（启用后）",
          )

          for path in sorted(Path("tests").rglob("*.py")):
              text = path.read_text(encoding="utf-8")
              matches = [
                  (number, line)
                  for number, line in enumerate(text.splitlines(), start=1)
                  if any(needle in line for needle in needles)
              ]
              if matches:
                  print(f"FILE {path}")
                  for number, line in matches:
                      print(f"  {number}: {line}")
          PY
