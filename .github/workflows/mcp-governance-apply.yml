name: Apply Validated MCP Governance Repair

on:
  push:
    paths:
      - ".github/workflows/mcp-governance-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/mcp-full-memory-governance
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply repair
        run: python scripts/apply_mcp_governance_fix.py

      - name: Install and validate
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest -q --no-cov \
            tests/test_memory_service_interface_edges.py \
            tests/test_connect_module_and_mcp_server_helpers.py \
            tests/test_connect_stdio_server.py
          python -m compileall -q \
            src/ms8/connect/mcp_server/memory_access_policy.py \
            src/ms8/connect/mcp_server/memory_service_interface.py \
            src/ms8/connect/mcp_server/mcp_server.py \
            src/ms8/connect/mcp_server/stdio_server.py

      - name: Commit repaired branch
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_mcp_governance_fix.py
          rm -f .github/workflows/mcp-governance-repair.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(mcp): enforce governed full-memory reads"
          git push origin HEAD:fix/mcp-full-memory-governance
