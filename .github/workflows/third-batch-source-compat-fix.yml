name: Apply final MCP source compatibility fix

on:
  push:
    branches:
      - "reliability/third-batch-memory-safety"
    paths:
      - ".github/workflows/third-batch-source-compat-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: reliability/third-batch-memory-safety
          fetch-depth: 0

      - name: Preserve default and explicit MCP source identities
        run: |
          python - <<'PY'
          import textwrap
          from pathlib import Path

          path = Path("src/ms8/connect/mcp_server/mcp_server.py")
          text = path.read_text(encoding="utf-8")
          old = '        payload.setdefault("source", _source_tag(_get_client_name(p)))\n'
          submit = (
              '        client_name = str(p.get("client") or p.get("client_name") or "").strip()\n'
              '        payload.setdefault("source", _source_tag(client_name or "submit"))\n'
          )
          batch = (
              '            client_name = str(p.get("client") or p.get("client_name") or "").strip()\n'
              '            payload.setdefault("source", _source_tag(client_name or "batch_submit"))\n'
          )
          if text.count(old) != 2:
              raise SystemExit(f"expected two source-tag anchors, found {text.count(old)}")
          text = text.replace(old, submit, 1)
          text = text.replace(old, batch, 1)
          path.write_text(text, encoding="utf-8")

          tests = textwrap.dedent(
              '''\
              from __future__ import annotations

              from ms8.connect.mcp_server import mcp_server


              class _CaptureService:
                  def __init__(self) -> None:
                      self.payloads: list[dict] = []

                  def submit(self, payload):
                      self.payloads.append(dict(payload))
                      return {"ok": True, "accepted": True}


              def test_submit_source_preserves_default_and_records_explicit_client(tmp_path, monkeypatch) -> None:
                  service = _CaptureService()
                  monkeypatch.setenv("OPENCLAW_MEMORY_AUTO_ROOT", str(tmp_path / "connect"))
                  monkeypatch.setattr(
                      mcp_server.MemoryServiceInterface,
                      "from_config",
                      classmethod(lambda cls, cfg: service),
                  )

                  default = mcp_server.call_tool(
                      "submit",
                      {"content": "default submit source"},
                      config={"mcp": {"enabled": True}},
                  )
                  explicit = mcp_server.call_tool(
                      "submit",
                      {"content": "explicit submit source", "client": "Codex"},
                      config={"mcp": {"enabled": True}},
                  )

                  assert default["ok"] is True
                  assert explicit["ok"] is True
                  assert service.payloads[0]["source"] == "mcp:submit"
                  assert service.payloads[1]["source"] == "mcp:codex"


              def test_batch_source_preserves_default_and_records_explicit_client(tmp_path, monkeypatch) -> None:
                  service = _CaptureService()
                  monkeypatch.setenv("OPENCLAW_MEMORY_AUTO_ROOT", str(tmp_path / "connect"))
                  monkeypatch.setattr(
                      mcp_server.MemoryServiceInterface,
                      "from_config",
                      classmethod(lambda cls, cfg: service),
                  )

                  default = mcp_server.call_tool(
                      "batch_submit",
                      {"memories": [{"content": "default batch source"}]},
                      config={"mcp": {"enabled": True}},
                  )
                  explicit = mcp_server.call_tool(
                      "batch_submit",
                      {
                          "client_name": "Claude",
                          "memories": [{"content": "explicit batch source"}],
                      },
                      config={"mcp": {"enabled": True}},
                  )

                  assert default["ok"] is True
                  assert explicit["ok"] is True
                  assert service.payloads[0]["source"] == "mcp:batch_submit"
                  assert service.payloads[1]["source"] == "mcp:claude"
              '''
          )
          Path("tests/test_third_batch_source_compat.py").write_text(tests, encoding="utf-8")
          PY

      - name: Install development dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Validate compatibility fix
        run: |
          python -m ruff format \
            src/ms8/connect/mcp_server/mcp_server.py \
            tests/test_third_batch_source_compat.py
          python -m ruff check --fix --exit-zero \
            src/ms8/connect/mcp_server/mcp_server.py \
            tests/test_third_batch_source_compat.py
          python -m ruff check \
            src/ms8/connect/mcp_server/mcp_server.py \
            tests/test_third_batch_source_compat.py
          python -m mypy src/ms8
          python -m pytest -q --tb=short --no-cov \
            tests/test_connect_contracts.py \
            tests/test_third_batch_source_compat.py \
            tests/test_third_batch_memory_safety.py \
            tests/test_third_batch_mcp_action_gate.py \
            tests/test_third_batch_browse_policy.py \
            tests/test_third_batch_recovery_chaos.py

      - name: Commit clean compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/third-batch-source-compat-fix.yml
          git add \
            src/ms8/connect/mcp_server/mcp_server.py \
            tests/test_third_batch_source_compat.py
          git commit -m "fix: preserve MCP submit source compatibility"
          git push origin HEAD:reliability/third-batch-memory-safety
