name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish artifacts to PyPI (requires PYPI_API_TOKEN)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      do_publish: ${{ steps.flags.outputs.do_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve publish flag
        id: flags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "do_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.publish_to_pypi }}" == "true" ]]; then
            echo "do_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-release
    if: needs.build-release.outputs.do_publish == 'true'
    permissions:
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI (token mode)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip twine
          python -m twine upload --skip-existing dist/*

      - name: Skip PyPI publish (missing secret)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        run: echo "PYPI_API_TOKEN is not set, skipping PyPI publish."

