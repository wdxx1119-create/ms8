name: Python Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install project and auditor
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/python -m pip install --upgrade pip
          .audit-venv/bin/python -m pip install -e . pip-audit

      - name: Generate dependency audit report
        run: |
          .audit-venv/bin/python -m pip_audit \
            --local \
            --format json \
            --output pip-audit.json

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: error
          retention-days: 14
