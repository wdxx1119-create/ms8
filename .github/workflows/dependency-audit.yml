name: Python Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "scripts/audit_installed_environment.py"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Prepare isolated target and audit environments
        run: |
          python -m venv .audit-target-venv
          python -m venv .audit-tool-venv
          .audit-target-venv/bin/python -m pip install --quiet --upgrade pip setuptools wheel
          .audit-target-venv/bin/python -m pip install --quiet .
          .audit-tool-venv/bin/python -m pip install --quiet --upgrade pip
          .audit-tool-venv/bin/python -m pip install --quiet pip-audit

      - name: Read project version
        id: project_version
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Audit installed runtime dependency closure
        id: audit
        continue-on-error: true
        run: |
          .audit-tool-venv/bin/python scripts/audit_installed_environment.py \
            --target-python .audit-target-venv/bin/python \
            --project-name ms8 \
            --project-version "${{ steps.project_version.outputs.value }}" \
            --requirements audit-requirements.txt \
            --json-report pip-audit.json \
            --sbom ms8-dependencies.cdx.json \
            --log dependency-audit.log

      - name: Upload dependency security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: |
            audit-requirements.txt
            pip-audit.json
            ms8-dependencies.cdx.json
            dependency-audit.log
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce dependency security gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s audit-requirements.txt
          test -s pip-audit.json
          test -s ms8-dependencies.cdx.json
          test -e dependency-audit.log
          if [[ "${{ steps.audit.outcome }}" != "success" ]]; then
            echo "::error::Strict runtime dependency audit or CycloneDX generation failed."
            cat dependency-audit.log || true
            exit 1
          fi
