name: Python Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Prepare isolated target and audit environments
        run: |
          python -m venv .audit-target-venv
          python -m venv .audit-tool-venv
          .audit-target-venv/bin/python -m pip install --upgrade pip setuptools wheel
          .audit-target-venv/bin/python -m pip install .
          .audit-tool-venv/bin/python -m pip install --upgrade pip
          .audit-tool-venv/bin/python -m pip install pip-audit

      - name: Resolve target site-packages
        id: target
        shell: bash
        run: |
          SITE_PACKAGES="$(
            .audit-target-venv/bin/python - <<'PY'
          import sysconfig

          print(sysconfig.get_paths()["purelib"])
          PY
          )"
          test -d "$SITE_PACKAGES"
          echo "site_packages=$SITE_PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Generate dependency audit report
        id: audit
        continue-on-error: true
        run: |
          .audit-tool-venv/bin/python -m pip_audit \
            --strict \
            --path "${{ steps.target.outputs.site_packages }}" \
            --progress-spinner off \
            --format json \
            --output pip-audit.json

      - name: Generate CycloneDX dependency SBOM
        id: sbom
        if: always()
        continue-on-error: true
        run: |
          .audit-tool-venv/bin/python -m pip_audit \
            --strict \
            --path "${{ steps.target.outputs.site_packages }}" \
            --progress-spinner off \
            --format cyclonedx-json \
            --output ms8-dependencies.cdx.json

      - name: Upload dependency security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pip-audit-report
          path: |
            pip-audit.json
            ms8-dependencies.cdx.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce dependency security gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s pip-audit.json
          test -s ms8-dependencies.cdx.json
          if [[ "${{ steps.audit.outcome }}" != "success" ]]; then
            echo "::error::pip-audit found a known vulnerability or could not complete the strict audit."
            exit 1
          fi
          if [[ "${{ steps.sbom.outcome }}" != "success" ]]; then
            echo "::error::CycloneDX SBOM generation or its vulnerability audit failed."
            exit 1
          fi
