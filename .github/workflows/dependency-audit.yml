name: Python Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install project and auditor
        run: |
          python -m venv .audit-venv
          .audit-venv/bin/python -m pip install --upgrade pip
          .audit-venv/bin/python -m pip install -e . pip-audit

      - name: Generate audit report and CycloneDX SBOM
        id: audit
        shell: bash
        run: |
          set +e
          .audit-venv/bin/python -m pip_audit \
            --strict \
            --local \
            --format json \
            --output pip-audit.json
          JSON_STATUS=$?

          .audit-venv/bin/python -m pip_audit \
            --strict \
            --local \
            --format cyclonedx-json \
            --output ms8-sbom.cdx.json
          SBOM_STATUS=$?

          if [[ "$JSON_STATUS" -ne 0 || "$SBOM_STATUS" -ne 0 ]]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload dependency security artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-security-reports
          path: |
            pip-audit.json
            ms8-sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce dependency audit result
        if: always()
        env:
          AUDIT_EXIT_CODE: ${{ steps.audit.outputs.exit_code }}
        run: |
          if [[ "$AUDIT_EXIT_CODE" != "0" ]]; then
            echo "::error::pip-audit found a known vulnerability or could not fully collect dependencies. Review dependency-security-reports."
            exit 1
          fi
          echo "pip-audit completed with no known vulnerabilities."
