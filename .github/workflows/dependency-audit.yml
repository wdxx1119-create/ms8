name: Python Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 1"
  pull_request:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - ".github/workflows/dependency-audit.yml"

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Prepare isolated target and audit environments
        run: |
          python -m venv .audit-target-venv
          python -m venv .audit-tool-venv
          .audit-target-venv/bin/python -m pip install --upgrade pip setuptools
          .audit-target-venv/bin/python -m pip install .
          .audit-tool-venv/bin/python -m pip install --upgrade pip setuptools
          .audit-tool-venv/bin/python -m pip install pip-audit

      - name: Resolve target site-packages
        id: target
        shell: bash
        run: |
          SITE_PACKAGES="$(
            .audit-target-venv/bin/python - <<'PY'
          import sysconfig

          print(sysconfig.get_paths()["purelib"])
          PY
          )"
          test -d "$SITE_PACKAGES"
          echo "site_packages=$SITE_PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Generate dependency audit report
        id: audit
        continue-on-error: true
        run: |
          .audit-tool-venv/bin/python -m pip_audit \
            --strict \
            --path "${{ steps.target.outputs.site_packages }}" \
            --progress-spinner off \
            --timeout 60 \
            --format json \
            --output pip-audit.json

      - name: Generate dependency CycloneDX SBOM
        id: sbom
        if: always()
        continue-on-error: true
        run: |
          .audit-tool-venv/bin/python -m pip_audit \
            --strict \
            --path "${{ steps.target.outputs.site_packages }}" \
            --progress-spinner off \
            --timeout 60 \
            --format cyclonedx-json \
            --output ms8-dependencies.cdx.json

      - name: Upload dependency security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pip-audit-report
          path: |
            pip-audit.json
            ms8-dependencies.cdx.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce dependency security gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s pip-audit.json
          test -s ms8-dependencies.cdx.json
          if [[ "${{ steps.audit.outcome }}" != "success" ]]; then
            echo "::error::pip-audit found a known vulnerability or could not complete the strict audit."
            exit 1
          fi
          if [[ "${{ steps.sbom.outcome }}" != "success" ]]; then
            echo "::error::CycloneDX dependency SBOM generation or its vulnerability audit failed."
            exit 1
          fi
