name: Release candidate validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "candidate/**"
  pull_request:
    branches:
      - main
      - "candidate/**"

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile package
        run: python -m compileall -q src/ms8

      - name: Run test suite
        run: python -m pytest

  quality:
    name: Static quality checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src/ms8

      - name: Mypy
        run: python -m mypy src/ms8

  release-artifacts:
    name: Build and verify release artifacts
    needs: [tests, quality]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install build twine cyclonedx-bom pip-audit

      - name: Build wheel and source distribution
        run: |
          rm -rf build dist
          python -m build

      - name: Read project version
        id: project_version
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify artifact metadata and filenames
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          test -f "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          test -f "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          python -m twine check dist/*

      - name: Verify wheel in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip setuptools
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check
          "$ENV_DIR/bin/ms8" version

      - name: Resolve installed-wheel audit paths
        id: release_audit_paths
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          SITE_PACKAGES="$(
            "$ENV_DIR/bin/python" - <<'PY'
          import sysconfig

          print(sysconfig.get_paths()["purelib"])
          PY
          )"
          test -d "$SITE_PACKAGES"
          echo "site_packages=$SITE_PACKAGES" >> "$GITHUB_OUTPUT"
          echo "audit_path=dist/ms8-${EXPECTED_VERSION}.audit.json" >> "$GITHUB_OUTPUT"
          echo "sbom_path=dist/ms8-${EXPECTED_VERSION}.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Audit installed-wheel environment
        id: release_audit
        continue-on-error: true
        shell: bash
        run: |
          python -m pip_audit \
            --strict \
            --path "${{ steps.release_audit_paths.outputs.site_packages }}" \
            --progress-spinner off \
            --timeout 60 \
            --format json \
            --output "${{ steps.release_audit_paths.outputs.audit_path }}"

      - name: Generate installed-wheel CycloneDX SBOM
        id: release_sbom
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          cyclonedx-py environment "$RUNNER_TEMP/ms8-wheel-venv/bin/python" \
            --output-format JSON \
            --output-file "${{ steps.release_audit_paths.outputs.sbom_path }}"

      - name: Validate installed-wheel security evidence
        id: validate_release_evidence
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          AUDIT_PATH="${{ steps.release_audit_paths.outputs.audit_path }}" \
          SBOM_PATH="${{ steps.release_audit_paths.outputs.sbom_path }}" \
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          audit_path = Path(os.environ["AUDIT_PATH"])
          sbom_path = Path(os.environ["SBOM_PATH"])
          expected_version = os.environ["EXPECTED_VERSION"]

          audit = json.loads(audit_path.read_text(encoding="utf-8"))
          dependencies = audit.get("dependencies")
          assert isinstance(dependencies, list) and dependencies
          vulnerabilities = [
              vulnerability
              for dependency in dependencies
              if isinstance(dependency, dict)
              for vulnerability in dependency.get("vulns", [])
          ]
          assert not vulnerabilities, vulnerabilities

          sbom = json.loads(sbom_path.read_text(encoding="utf-8"))
          assert sbom.get("bomFormat") == "CycloneDX"
          components = [item for item in sbom.get("components", []) if isinstance(item, dict)]
          assert any(
              str(component.get("name", "")).strip().lower() == "ms8"
              and str(component.get("version", "")).strip() == expected_version
              for component in components
          )
          PY

      - name: Verify source distribution in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          ENV_DIR="$RUNNER_TEMP/ms8-sdist-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip setuptools
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check

      - name: Generate SHA-256 checksums
        id: release_checksums
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          test -s "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          test -s "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          test -s "dist/ms8-${EXPECTED_VERSION}.audit.json"
          test -s "dist/ms8-${EXPECTED_VERSION}.cdx.json"
          (cd dist && shasum -a 256 *.whl *.tar.gz *.audit.json *.cdx.json > SHA256SUMS)
          cat dist/SHA256SUMS
          {
            echo "### Release candidate artifacts"
            echo "- commit: $GITHUB_SHA"
            echo "- audit: strict JSON report for the installed wheel environment"
            echo "- SBOM: CycloneDX JSON generated from the installed wheel environment"
            echo '```text'
            cat dist/SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ms8-v${{ steps.project_version.outputs.value }}-${{ github.sha }}
          path: |
            dist/ms8-${{ steps.project_version.outputs.value }}-py3-none-any.whl
            dist/ms8-${{ steps.project_version.outputs.value }}.tar.gz
            dist/ms8-${{ steps.project_version.outputs.value }}.audit.json
            dist/ms8-${{ steps.project_version.outputs.value }}.cdx.json
            dist/SHA256SUMS
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce release security evidence gate
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          FAILED=0

          if [[ "${{ steps.release_audit.outcome }}" != "success" ]]; then
            echo "::error::The installed-wheel strict vulnerability audit failed."
            FAILED=1
          fi
          if [[ "${{ steps.release_sbom.outcome }}" != "success" ]]; then
            echo "::error::The installed-wheel CycloneDX SBOM command failed."
            FAILED=1
          fi
          if [[ "${{ steps.validate_release_evidence.outcome }}" != "success" ]]; then
            echo "::error::The installed-wheel audit report or SBOM failed validation."
            FAILED=1
          fi
          if [[ "${{ steps.release_checksums.outcome }}" != "success" ]]; then
            echo "::error::Release evidence checksum generation failed."
            FAILED=1
          fi

          for FILE in \
            "dist/ms8-${EXPECTED_VERSION}.audit.json" \
            "dist/ms8-${EXPECTED_VERSION}.cdx.json" \
            "dist/SHA256SUMS"; do
            if [[ ! -s "$FILE" ]]; then
              echo "::error::Required release evidence is missing or empty: $FILE"
              FAILED=1
            fi
          done

          exit "$FAILED"
