name: Release candidate validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "candidate/**"
  pull_request:
    branches:
      - main
      - "candidate/**"

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile package
        run: python -m compileall -q src/ms8

      - name: Run test suite
        run: python -m pytest

  quality:
    name: Static quality checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src/ms8

      - name: Mypy
        run: python -m mypy src/ms8

  release-artifacts:
    name: Build and verify release artifacts
    needs: [tests, quality]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine cyclonedx-bom

      - name: Build wheel and source distribution
        run: |
          rm -rf build dist
          python -m build

      - name: Read project version
        id: project_version
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify artifact metadata and filenames
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          test -f "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          test -f "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          python -m twine check dist/*

      - name: Verify wheel in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check
          "$ENV_DIR/bin/ms8" version

      - name: Generate and validate CycloneDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          SBOM="dist/ms8-${EXPECTED_VERSION}.cdx.json"
          cyclonedx-py environment "$ENV_DIR/bin/python" \
            --output-format JSON \
            --output-file "$SBOM"
          EXPECTED_VERSION="$EXPECTED_VERSION" SBOM="$SBOM" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ['SBOM']).read_text(encoding='utf-8'))
          assert payload.get('bomFormat') == 'CycloneDX'
          components = payload.get('components', [])
          assert any(
              item.get('name', '').lower() == 'ms8'
              and item.get('version') == os.environ['EXPECTED_VERSION']
              for item in components
              if isinstance(item, dict)
          )
          PY

      - name: Verify source distribution in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          ENV_DIR="$RUNNER_TEMP/ms8-sdist-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && shasum -a 256 *.whl *.tar.gz *.cdx.json > SHA256SUMS)
          cat dist/SHA256SUMS
          {
            echo "### Release candidate artifacts"
            echo "- commit: $GITHUB_SHA"
            echo "- SBOM: CycloneDX JSON generated from the installed wheel environment"
            echo '```text'
            cat dist/SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload independently verified artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ms8-v${{ steps.project_version.outputs.value }}-${{ github.sha }}
          path: |
            dist/ms8-${{ steps.project_version.outputs.value }}-py3-none-any.whl
            dist/ms8-${{ steps.project_version.outputs.value }}.tar.gz
            dist/ms8-${{ steps.project_version.outputs.value }}.cdx.json
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
