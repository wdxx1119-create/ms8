name: Release candidate validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "candidate/**"
  pull_request:
    branches:
      - main
      - "candidate/**"

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile package
        run: python -m compileall -q src/ms8

      - name: Run test suite
        run: python -m pytest

  quality:
    name: Static quality checks
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check src/ms8

      - name: Mypy
        run: python -m mypy src/ms8

  release-artifacts:
    name: Build and verify release artifacts
    needs: [tests, quality]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pip-audit

      - name: Build wheel and source distribution
        run: |
          rm -rf build dist
          python -m build

      - name: Read project version
        id: project_version
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify artifact metadata and filenames
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          test -f "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          test -f "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          python -m twine check dist/*

      - name: Verify wheel in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip setuptools wheel
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check
          "$ENV_DIR/bin/ms8" version

      - name: Generate installed-wheel CycloneDX SBOM
        id: wheel_audit
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          ENV_DIR="$RUNNER_TEMP/ms8-wheel-venv"
          SITE_PACKAGES="$(
            "$ENV_DIR/bin/python" - <<'PY'
          import sysconfig

          print(sysconfig.get_paths()["purelib"])
          PY
          )"
          SBOM="dist/ms8-${EXPECTED_VERSION}.cdx.json"
          test -d "$SITE_PACKAGES"
          {
            python -m pip_audit \
              --strict \
              --path "$SITE_PACKAGES" \
              --progress-spinner off \
              --format cyclonedx-json \
              --output "$SBOM"
          } 2>&1 | tee dist/wheel-audit.log
          exit "${PIPESTATUS[0]}"

      - name: Validate installed-wheel CycloneDX SBOM
        id: sbom_validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          SBOM="dist/ms8-${EXPECTED_VERSION}.cdx.json"
          test -s "$SBOM"
          EXPECTED_VERSION="$EXPECTED_VERSION" SBOM="$SBOM" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ['SBOM']).read_text(encoding='utf-8'))
          assert payload.get('bomFormat') == 'CycloneDX'
          assert payload.get('specVersion')
          components = payload.get('components', [])
          assert any(
              item.get('name', '').lower() == 'ms8'
              and item.get('version') == os.environ['EXPECTED_VERSION']
              for item in components
              if isinstance(item, dict)
          )
          PY

      - name: Verify source distribution in a clean environment
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          ENV_DIR="$RUNNER_TEMP/ms8-sdist-venv"
          python -m venv "$ENV_DIR"
          "$ENV_DIR/bin/python" -m pip install --upgrade pip setuptools wheel
          "$ENV_DIR/bin/python" -m pip install "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$ENV_DIR/bin/python" - <<'PY'
          import os
          from importlib.metadata import version
          from importlib.resources import files

          expected = os.environ['EXPECTED_VERSION']
          assert version('ms8') == expected
          root = files('ms8')
          assert root.joinpath('connect/config/mcp_config.yaml').is_file()
          assert root.joinpath('connect/adapter_registry/adapters.json').is_file()
          PY
          "$ENV_DIR/bin/python" -m pip check

      - name: Generate SHA-256 checksums
        id: checksums
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          cd dist
          files=(
            "ms8-${EXPECTED_VERSION}-py3-none-any.whl"
            "ms8-${EXPECTED_VERSION}.tar.gz"
          )
          if [[ -s "ms8-${EXPECTED_VERSION}.cdx.json" ]]; then
            files+=("ms8-${EXPECTED_VERSION}.cdx.json")
          fi
          shasum -a 256 "${files[@]}" > SHA256SUMS
          cat SHA256SUMS
          {
            echo "### Release candidate artifacts"
            echo "- commit: $GITHUB_SHA"
            echo "- SBOM: CycloneDX JSON generated and vulnerability-audited from the installed wheel environment"
            echo '```text'
            cat SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release candidate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ms8-v${{ steps.project_version.outputs.value }}-${{ github.sha }}
          path: |
            dist/ms8-${{ steps.project_version.outputs.value }}-py3-none-any.whl
            dist/ms8-${{ steps.project_version.outputs.value }}.tar.gz
            dist/ms8-${{ steps.project_version.outputs.value }}.cdx.json
            dist/SHA256SUMS
            dist/wheel-audit.log
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce installed-wheel security gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${{ steps.project_version.outputs.value }}"
          test -s "dist/ms8-${EXPECTED_VERSION}-py3-none-any.whl"
          test -s "dist/ms8-${EXPECTED_VERSION}.tar.gz"
          test -s "dist/ms8-${EXPECTED_VERSION}.cdx.json"
          test -s "dist/SHA256SUMS"
          test -e "dist/wheel-audit.log"
          if [[ "${{ steps.wheel_audit.outcome }}" != "success" ]]; then
            echo "::error::Installed-wheel pip-audit found a vulnerability or could not complete the strict audit."
            exit 1
          fi
          if [[ "${{ steps.sbom_validation.outcome }}" != "success" ]]; then
            echo "::error::Installed-wheel CycloneDX SBOM validation failed."
            exit 1
          fi
          if [[ "${{ steps.checksums.outcome }}" != "success" ]]; then
            echo "::error::Release candidate checksum generation failed."
            exit 1
          fi
