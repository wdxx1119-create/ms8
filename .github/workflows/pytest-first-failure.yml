name: Pytest first failure

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture first failure
        env:
          PYTHONPATH: src
        run: |
          set +e
          python -m pytest tests/ -q -x > pytest-first-failure.txt 2>&1
          code=$?
          echo "pytest_exit_code=$code" >> pytest-first-failure.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pytest-first-failure
          path: pytest-first-failure.txt
          if-no-files-found: error
          retention-days: 1
