name: Memory Hybrid Reference Acceptance

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/memory-hybrid-reference.yml"
      - "src/ms8/memory/**"
      - "scripts/run_memory_hybrid_v1_macos_acceptance.py"
      - "scripts/run_memory_hybrid_v1_trace_parity.py"
      - "tests/fixtures/memory_hybrid_v1/**"
      - "tests/test_memory_hybrid_evaluation.py"
      - "tests/test_memory_hybrid_reference_acceptance.py"
      - "tests/test_memory_hybrid_trace_parity.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: memory-hybrid-reference-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-reference-acceptance:
    name: macOS reference acceptance
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install acceptance dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Prepare artifact directory
        run: mkdir -p artifacts/memory_hybrid_v1_macos_acceptance

      - name: Run evaluation contract tests
        id: contract_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --no-cov \
            tests/test_memory_hybrid_evaluation.py \
            tests/test_memory_hybrid_reference_acceptance.py \
            tests/test_memory_hybrid_trace_parity.py \
            2>&1 | tee artifacts/memory_hybrid_v1_macos_acceptance/contract-tests.log

      - name: Run macOS reference acceptance
        id: acceptance
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_memory_hybrid_v1_macos_acceptance.py \
            --output-dir artifacts/memory_hybrid_v1_macos_acceptance \
            2>&1 | tee artifacts/memory_hybrid_v1_macos_acceptance/console.log

      - name: Capture deterministic trace fingerprints
        id: trace_parity
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_memory_hybrid_v1_trace_parity.py \
            --output artifacts/memory_hybrid_v1_macos_acceptance/trace-parity.json \
            2>&1 | tee artifacts/memory_hybrid_v1_macos_acceptance/trace-parity.log

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: memory-hybrid-v1-macos-reference
          path: artifacts/memory_hybrid_v1_macos_acceptance
          if-no-files-found: error
          retention-days: 14

      - name: Enforce macOS acceptance gates
        if: always()
        shell: bash
        run: |
          test "${{ steps.contract_tests.outcome }}" = "success"
          test "${{ steps.acceptance.outcome }}" = "success"
          test "${{ steps.trace_parity.outcome }}" = "success"
