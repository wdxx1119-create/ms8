name: Candidate mypy diagnostic

on:
  push:
    branches:
      - "rc-*"

permissions:
  contents: read

concurrency:
  group: candidate-mypy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mypy-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development environment
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Run mypy and preserve output
        id: mypy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m mypy src/ms8 2>&1 | tee candidate-mypy.log

      - name: Upload mypy diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-mypy-${{ github.sha }}
          path: candidate-mypy.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce mypy result
        if: always()
        run: |
          if [[ "${{ steps.mypy.outcome }}" != "success" ]]; then
            exit 1
          fi
