name: Examples smoke

on:
  push:
    branches: ["main"]
    paths:
      - "examples/**"
      - "src/ms8/**"
      - "pyproject.toml"
      - ".github/workflows/examples.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "examples/**"
      - "src/ms8/**"
      - "pyproject.toml"
      - ".github/workflows/examples.yml"

permissions:
  contents: read

jobs:
  examples-smoke:
    name: Examples smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run isolated CLI example end to end
        run: python examples/isolated_cli.py

      - name: Run local text parsing example
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          sample="$tmp_dir/synthetic example note.txt"
          printf '%s\n' \
            'Synthetic project note for the MS8 example workflow.' \
            'Parsing this file does not approve or submit it as memory.' \
            > "$sample"

          output="$(python examples/parse_local_text.py "$sample")"
          printf '%s\n' "$output"
          grep -q 'parse_status: parsed' <<<"$output"
          grep -q 'submitted_to_ms8: false' <<<"$output"
          if grep -q 'Synthetic project note' <<<"$output"; then
            echo 'Parser example exposed content without explicit preview.' >&2
            exit 1
          fi

          python examples/parse_local_text.py \
            "$sample" \
            --show-preview \
            --preview-chars 80
