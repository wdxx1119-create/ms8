name: Scheduled platform boundary matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: scheduled-platform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  boundary-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile package
        run: python -m compileall -q src/ms8

      - name: Run canonical test suite
        env:
          PYTHONPATH: src
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED: "0"
          MS8_DOCTOR_ALLOW_DEGRADED: "1"
        run: python -m pytest -q

      - name: Doctor smoke
        env:
          PYTHONPATH: src
          MS8_HOME: ${{ runner.temp }}/ms8-scheduled
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED: "0"
          MS8_DOCTOR_ALLOW_DEGRADED: "1"
        run: python -m ms8 doctor
