name: Third batch CI diagnostic

on:
  push:
    branches:
      - "reliability/third-batch-memory-safety"
    paths:
      - ".github/workflows/third-batch-ci-diagnostic.yml"

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: reliability/third-batch-memory-safety

      - name: Setup Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Run full pytest diagnostic
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --tb=short --no-cov 2>&1 | tee third-batch-full-pytest.log

      - name: Upload full pytest log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-batch-full-pytest-${{ github.sha }}
          path: third-batch-full-pytest.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce pytest result
        if: always()
        run: test "${{ steps.pytest.outcome }}" = "success"
