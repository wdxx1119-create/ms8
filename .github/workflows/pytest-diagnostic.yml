name: Pytest diagnostic

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  first-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Capture first failure
        shell: bash
        run: |
          set +e
          PYTHONPATH=src python -m pytest tests/ -x -vv > pytest-first-failure.txt 2>&1
          echo "exit_code=$?" >> pytest-first-failure.txt
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pytest-first-failure
          path: pytest-first-failure.txt
          if-no-files-found: error
          retention-days: 1
