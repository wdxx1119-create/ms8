name: Apply third-batch memory safety slice

# Gate revision: nullable confidence typing is explicit.

on:
  push:
    branches:
      - "reliability/third-batch-memory-safety"
    paths:
      - ".github/workflows/third-batch-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: reliability/third-batch-memory-safety
          fetch-depth: 0

      - name: Apply existing-file changes
        run: python scripts/patch_third_batch_existing.py

      - name: Install development dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Normalize generated source
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/ms8/recovery.py")
          text = path.read_text(encoding="utf-8")
          broken = 'handle.write(json.dumps(event, ensure_ascii=False, sort_keys=True) + "\n")'
          fixed = 'handle.write(json.dumps(event, ensure_ascii=False, sort_keys=True) + "\\n")'
          if broken not in text:
              raise SystemExit("generated restore audit newline anchor not found")
          path.write_text(text.replace(broken, fixed, 1), encoding="utf-8")
          PY
          python -m ruff check --fix src/ms8/engine.py

      - name: Ruff
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check \
            src/ms8/memory_safety.py \
            src/ms8/record_policy.py \
            src/ms8/engine.py \
            src/ms8/recovery.py \
            src/ms8/connect/mcp_server/mcp_server.py \
            src/ms8/connect/mcp_server/memory_access_policy.py \
            src/ms8/connect/mcp_server/memory_service_interface.py \
            src/ms8/connect/mcp_server/stdio_server.py \
            tests/test_third_batch_memory_safety.py \
            tests/test_third_batch_mcp_action_gate.py \
            tests/test_third_batch_recovery_chaos.py 2>&1 | tee third-batch-ruff.log

      - name: Mypy
        shell: bash
        run: |
          set -o pipefail
          python -m mypy src/ms8 2>&1 | tee third-batch-mypy.log

      - name: Targeted pytest
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --tb=short \
            tests/test_third_batch_memory_safety.py \
            tests/test_third_batch_mcp_action_gate.py \
            tests/test_third_batch_recovery_chaos.py \
            tests/test_record_policy_and_review_edges.py \
            tests/test_engine_retrieval_gateway.py \
            tests/test_connect_stdio_server.py \
            tests/test_recovery_roundtrip.py 2>&1 | tee third-batch-pytest.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-batch-diagnostics-${{ github.sha }}
          path: |
            third-batch-ruff.log
            third-batch-mypy.log
            third-batch-pytest.log
          if-no-files-found: warn
          retention-days: 3

      - name: Commit validated existing-file changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/ms8/record_policy.py \
            src/ms8/engine.py \
            src/ms8/recovery.py \
            src/ms8/connect/mcp_server/mcp_server.py \
            src/ms8/connect/mcp_server/memory_access_policy.py \
            src/ms8/connect/mcp_server/memory_service_interface.py \
            src/ms8/connect/mcp_server/stdio_server.py \
            docs/DATA_MODEL.md
          if git diff --cached --quiet; then
            echo "No validated existing-file changes to commit."
            exit 0
          fi
          git commit -m "reliability: wire provenance action gate and restore chaos handling"
          git push origin HEAD:reliability/third-batch-memory-safety
