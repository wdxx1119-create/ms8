name: Apply third-batch action-gate hardening

on:
  push:
    branches:
      - "reliability/third-batch-memory-safety"
    paths:
      - ".github/workflows/third-batch-apply.yml"

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: reliability/third-batch-memory-safety
          fetch-depth: 0

      - name: Replace action-gate functions by boundary
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          def replace_pattern(path: str, pattern: str, replacement: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.S | re.M)
              if count != 1:
                  raise SystemExit(f"expected one match in {path}, got {count}: {pattern}")
              target.write_text(updated, encoding="utf-8")

          replace_pattern(
              "src/ms8/memory_safety.py",
              r'^    if lane == "action":\n.*?^    unique_reasons = list\(dict\.fromkeys\(reasons\)\)',
              '''    if lane == "action":
                  if row.get("can_act_on") is not True:
                      reasons.append("action_not_authorized_by_record")
                  if status != "verified":
                      reasons.append("action_record_not_verified")
                  if authority != "user_explicit":
                      reasons.append("action_authority_not_user_explicit")
                  if verification_state != "verified":
                      reasons.append("action_provenance_not_verified")
                  authorized_action = _normalized_text(row.get("authorized_action") or "")
                  requested_action = _normalized_text(query)
                  if not authorized_action:
                      reasons.append("action_scope_missing")
                  elif authorized_action.casefold() != requested_action.casefold():
                      reasons.append("action_scope_mismatch")
              unique_reasons = list(dict.fromkeys(reasons))''',
          )
          replace_pattern(
              "src/ms8/memory_safety.py",
              r'^def pre_action_check\(\n.*?^def provenance_fingerprint',
              '''def pre_action_check(
                  *,
                  action: str,
                  records: list[dict[str, Any]],
                  memory_ids: list[str] | None = None,
                  explicit_user_confirmation: bool = False,
              ) -> dict[str, Any]:
                  action_text = _normalized_text(action)
                  selected_ids = {str(item).strip() for item in (memory_ids or []) if str(item).strip()}
                  selected = [row for row in records if str(row.get("id") or "") in selected_ids]
                  decisions = [evaluate_memory_policy(row, query=action_text, purpose="action") for row in selected]
                  eligible_ids = [str(item.get("record_id") or "") for item in decisions if item.get("allowed")]
                  reason_counts: Counter[str] = Counter()
                  for item in decisions:
                      if not item.get("allowed"):
                          reason_counts.update(str(code) for code in item.get("reason_codes", []))
                  missing_ids = sorted(selected_ids - {str(row.get("id") or "") for row in selected})
                  all_selected_eligible = bool(decisions) and len(eligible_ids) == len(decisions)
                  if not action_text:
                      reason_counts.update(["action_required"])
                  if not selected_ids:
                      reason_counts.update(["supporting_memory_required"])
                  if missing_ids:
                      reason_counts.update(["memory_id_not_found"])
                  if all_selected_eligible and not explicit_user_confirmation:
                      reason_counts.update(["human_confirmation_required"])
                  allowed = bool(
                      action_text
                      and selected_ids
                      and all_selected_eligible
                      and explicit_user_confirmation
                      and not missing_ids
                  )
                  return {
                      "ok": True,
                      "decision": "allow" if allowed else "deny",
                      "allowed": allowed,
                      "execution_performed": False,
                      "action": action_text,
                      "requires_confirmation": bool(all_selected_eligible and not explicit_user_confirmation),
                      "explicit_user_confirmation": bool(explicit_user_confirmation),
                      "eligible_record_ids": eligible_ids,
                      "evaluated_record_ids": [str(row.get("id") or "") for row in selected],
                      "missing_record_ids": missing_ids,
                      "reason_counts": dict(sorted(reason_counts.items())),
                      "record_decisions": decisions,
                  }


              def provenance_fingerprint''',
          )
          replace_pattern(
              "tests/test_third_batch_memory_safety.py",
              r'^def test_pre_action_requires_independent_authority_and_confirmation\(\) -> None:\n.*?^def test_engine_trace_counts_policy_reasons',
              '''def test_pre_action_requires_independent_authority_and_confirmation() -> None:
                  ordinary = build_canonical_record("User prefers local storage", "ask")
                  denied = pre_action_check(
                      action="delete remote copy",
                      records=[ordinary],
                      memory_ids=[ordinary["id"]],
                      explicit_user_confirmation=True,
                  )
                  assert denied["allowed"] is False
                  assert denied["reason_counts"]["action_not_authorized_by_record"] == 1

                  authorized = build_canonical_record(
                      "User explicitly authorizes this exact cleanup",
                      "ask",
                      status="verified",
                  )
                  authorized["can_act_on"] = True
                  authorized["authorized_action"] = "delete remote copy"
                  authorized["provenance"]["verification_state"] = "verified"
                  authorized["provenance"]["confidence"] = 1.0
                  no_confirmation = pre_action_check(
                      action="delete remote copy",
                      records=[authorized],
                      memory_ids=[authorized["id"]],
                  )
                  assert no_confirmation["allowed"] is False
                  assert no_confirmation["requires_confirmation"] is True
                  allowed = pre_action_check(
                      action="delete remote copy",
                      records=[authorized],
                      memory_ids=[authorized["id"]],
                      explicit_user_confirmation=True,
                  )
                  assert allowed["allowed"] is True
                  assert allowed["execution_performed"] is False


              def test_pre_action_fails_closed_without_explicit_or_uniform_support() -> None:
                  authorized = build_canonical_record("Exact action authorization", "ask", status="verified")
                  authorized["can_act_on"] = True
                  authorized["authorized_action"] = "delete remote copy"
                  authorized["provenance"]["verification_state"] = "verified"
                  authorized["provenance"]["confidence"] = 1.0

                  without_support = pre_action_check(
                      action="delete remote copy",
                      records=[authorized],
                      explicit_user_confirmation=True,
                  )
                  assert without_support["allowed"] is False
                  assert without_support["reason_counts"]["supporting_memory_required"] == 1

                  mismatched = pre_action_check(
                      action="send an email",
                      records=[authorized],
                      memory_ids=[authorized["id"]],
                      explicit_user_confirmation=True,
                  )
                  assert mismatched["allowed"] is False
                  assert mismatched["reason_counts"]["action_scope_mismatch"] == 1

                  untrusted = build_canonical_record("Assistant suggested the same action", "mcp:assistant")
                  mixed = pre_action_check(
                      action="delete remote copy",
                      records=[authorized, untrusted],
                      memory_ids=[authorized["id"], untrusted["id"]],
                      explicit_user_confirmation=True,
                  )
                  assert mixed["allowed"] is False
                  assert authorized["id"] in mixed["eligible_record_ids"]
                  assert mixed["reason_counts"]["action_not_authorized_by_record"] == 1


              def test_engine_trace_counts_policy_reasons''',
          )
          PY

      - name: Install development dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Format generated hardening
        run: |
          python -m ruff format src/ms8/memory_safety.py tests/test_third_batch_memory_safety.py
          python -m ruff check --fix --exit-zero src/ms8/memory_safety.py tests/test_third_batch_memory_safety.py

      - name: Ruff
        run: python -m ruff check src/ms8/memory_safety.py tests/test_third_batch_memory_safety.py

      - name: Mypy
        run: python -m mypy src/ms8

      - name: Targeted pytest
        run: |
          python -m pytest -q --tb=short --no-cov \
            tests/test_third_batch_memory_safety.py \
            tests/test_third_batch_mcp_action_gate.py \
            tests/test_third_batch_recovery_chaos.py \
            tests/test_engine_retrieval_gateway.py \
            tests/test_connect_stdio_server.py

      - name: Commit validated hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ms8/memory_safety.py tests/test_third_batch_memory_safety.py
          git commit -m "security: fail closed on action evidence selection"
          git push origin HEAD:reliability/third-batch-memory-safety
