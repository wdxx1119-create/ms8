name: Third batch patch snapshot

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/third-batch-source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Upload patch inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-batch-patch-snapshot-${{ github.sha }}
          path: |
            .github/workflows/third-batch-apply.yml
            src/ms8/record_policy.py
            src/ms8/engine.py
            src/ms8/recovery.py
            src/ms8/connect/mcp_server/mcp_server.py
            src/ms8/connect/mcp_server/memory_access_policy.py
            src/ms8/connect/mcp_server/memory_service_interface.py
            src/ms8/connect/mcp_server/stdio_server.py
            docs/DATA_MODEL.md
          if-no-files-found: error
          retention-days: 1
