name: Third batch source inventory

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/third-batch-inventory.yml"

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Collect inventory
        run: |
          find src/ms8 tests -type f -not -path '*/__pycache__/*' | sort > third-batch-source-inventory.txt
          grep -RIlE 'MCP|mcp|can_act_on|restore_runtime_backup|MemoryAdmissionEngine' src/ms8 tests | sort > third-batch-relevant-files.txt || true

      - name: Upload inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: third-batch-source-inventory-${{ github.sha }}
          path: |
            third-batch-source-inventory.txt
            third-batch-relevant-files.txt
          if-no-files-found: error
          retention-days: 1
