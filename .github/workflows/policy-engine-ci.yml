name: Policy Engine CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "dist_src/ms8_policy_engine/**"
      - "src/ms8/engine_core/policy_engine_*.py"
      - "scripts/build_policy_engine_wheel.sh"
      - "scripts/verify_policy_backend_contract.py"
      - ".github/workflows/policy-engine-ci.yml"
      - "tests/test_policy_engine_*.py"
      - "tests/test_shadow_policy_engine_hook.py"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "dist_src/ms8_policy_engine/**"
      - "src/ms8/engine_core/policy_engine_*.py"
      - "scripts/build_policy_engine_wheel.sh"
      - "scripts/verify_policy_backend_contract.py"
      - ".github/workflows/policy-engine-ci.yml"
      - "tests/test_policy_engine_*.py"
      - "tests/test_shadow_policy_engine_hook.py"
  workflow_dispatch:

jobs:
  policy-wheel-and-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build/install/verify closed policy backend
        run: |
          bash scripts/build_policy_engine_wheel.sh

      - name: Strict mode gate (missing module must fail-closed)
        run: |
          set +e
          MS8_POLICY_BACKEND=closed \
          MS8_POLICY_STRICT=1 \
          MS8_POLICY_MODULE=does_not_exist_for_ci_gate \
          PYTHONPATH=src \
          python scripts/verify_policy_backend_contract.py
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "[ERROR] strict gate expected failure but command succeeded"
            exit 1
          fi
          echo "[OK] strict gate fail-closed behavior verified (exit=$rc)"

      - name: Governance warning gate (configurable)
        env:
          MS8_POLICY_BACKEND: closed
          MS8_GOV_GATE_MODE: warn
          MS8_GOV_FAIL_ON_SECURITY_WARN: "true"
          MS8_GOV_FAIL_ON_OVERALL_FAIL: "true"
          MS8_GOV_FAIL_ON_OVERALL_WARN: "false"
          MS8_GOV_FAIL_ON_ANY_LAYER_WARN: "false"
        run: |
          python scripts/check_governance_gate.py

      - name: Policy attack sample gate
        env:
          PYTHONPATH: src
          MS8_POLICY_BACKEND: closed
        run: |
          python scripts/policy_attack_sample_report.py

      - name: Run policy-focused tests
        run: |
          python -m pytest \
            tests/test_policy_engine_loader.py \
            tests/test_policy_engine_iface_contract.py \
            tests/test_policy_engine_phase2_hooks.py \
            tests/test_policy_engine_phase4_hooks.py \
            tests/test_policy_engine_regressions.py \
            tests/test_policy_engine_closed_adversarial.py \
            tests/test_policy_engine_attack_samples.py \
            tests/test_runtime_policy_attack_report.py \
            tests/test_shadow_policy_engine_hook.py \
            -q
