name: CI

on:
  push:
    branches: ["main", "candidate/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -e ".[dev]"

      - name: Mypy
        if: matrix.python-version == '3.11'
        run: python -m mypy src/ms8 2>&1 | tee mypy.log

      - name: Ruff
        run: python -m ruff check src/ms8

      - name: Pytest
        if: matrix.python-version != '3.11'
        env:
          PYTHONPATH: src
        run: python -m pytest -q

      - name: Pytest with coverage
        if: matrix.python-version == '3.11'
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q \
            --cov=ms8 \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python-3.11
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

      - name: Enforce 80% line coverage baseline
        if: matrix.python-version == '3.11'
        run: |
          python - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree

          report = Path("coverage.xml")
          root = ElementTree.parse(report).getroot()
          line_rate = float(root.attrib["line-rate"]) * 100
          branch_rate = float(root.attrib.get("branch-rate", "0")) * 100
          print(f"line coverage: {line_rate:.2f}%")
          print(f"branch coverage (reported, not gated): {branch_rate:.2f}%")
          if line_rate < 80.0:
              raise SystemExit(f"line coverage {line_rate:.2f}% is below the 80.00% baseline")
          PY

      - name: Doctor smoke
        env:
          PYTHONPATH: src
          MS8_HOME: /tmp/ms8-ci
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED: "0"
          MS8_DOCTOR_ALLOW_DEGRADED: "1"
        run: python -m ms8 doctor

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build

      - name: Install from wheel
        run: |
          python -m pip install dist/*.whl
          python -m ms8 version
          ms8-recovery --help

  install-profile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        profile: [core, llm, absorb, ocr, policy, full]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build --wheel --no-isolation

      - name: Install and verify profile
        shell: bash
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          set -euo pipefail
          WHEEL="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path('dist').glob('ms8-*.whl'))
          if len(wheels) != 1:
              raise SystemExit(f'expected one wheel, found {len(wheels)}')
          print(wheels[0].resolve())
          PY
          )"
          ENV_DIR="$RUNNER_TEMP/ms8-profile-$PROFILE"
          python -m venv "$ENV_DIR"
          PYTHON="$ENV_DIR/bin/python"
          "$PYTHON" -m pip install --upgrade pip setuptools wheel
          SPEC="$WHEEL"
          if [[ "$PROFILE" != "core" ]]; then
            SPEC="${WHEEL}[${PROFILE}]"
          fi
          "$PYTHON" -m pip install "$SPEC"
          "$PYTHON" -m pip check
          PROFILE="$PROFILE" "$PYTHON" - <<'PY'
          import importlib
          import importlib.metadata
          import os

          profile = os.environ['PROFILE']
          importlib.import_module('ms8')
          if profile in {'llm', 'full'}:
              importlib.import_module('ollama')
          if profile in {'absorb', 'ocr', 'full'}:
              for name in ('watchdog', 'pypdf', 'docx'):
                  importlib.import_module(name)
          if profile in {'ocr', 'full'}:
              for name in ('pytesseract', 'pdf2image', 'PIL'):
                  importlib.import_module(name)
          if profile in {'policy', 'full'}:
              importlib.metadata.version('ms8-policy-core')
          print(f'profile {profile}: ok')
          PY

  cleanroom-online-install:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build --no-isolation

      - name: Install wheel with dependencies (online clean-room)
        run: |
          TMP_BASE="$(mktemp -d)"
          python -m venv "$TMP_BASE/venv"
          "$TMP_BASE/venv/bin/python" -m pip install --upgrade pip
          "$TMP_BASE/venv/bin/python" -m pip install dist/*.whl
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" --help
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" ask "记住 cleanroom install check"
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" ask "cleanroom install"
          "$TMP_BASE/venv/bin/ms8-recovery" --help

  windows-wheel-smoke:
    name: windows-wheel-smoke
    runs-on: windows-latest
    needs: lint-and-test
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Build wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build --wheel --no-isolation

      - name: Install wheel and run cross-platform smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $base = Join-Path $env:RUNNER_TEMP "ms8 windows 空格"
          if (Test-Path $base) {
            Remove-Item -Recurse -Force $base
          }
          $venv = Join-Path $base "venv"
          python -m venv $venv
          $python = Join-Path $venv "Scripts\python.exe"
          & $python -m pip install --upgrade pip
          $wheel = Get-ChildItem -Path "dist\*.whl" | Select-Object -First 1
          if (-not $wheel) {
            throw "wheel not found"
          }
          & $python -m pip install $wheel.FullName
          $smokeRoot = Join-Path $base "runtime 数据"
          $smokeLog = Join-Path $env:RUNNER_TEMP "windows-smoke.log"
          & $python scripts\release_smoke.py --base-dir $smokeRoot *>&1 | Tee-Object -FilePath $smokeLog
          if ($LASTEXITCODE -ne 0) {
            throw "cross-platform smoke failed with exit code $LASTEXITCODE"
          }
          $recovery = Join-Path $venv "Scripts\ms8-recovery.exe"
          & $recovery --help
          $ledger = Join-Path $venv "Scripts\ms8-memory-ledger.exe"
          & $ledger --help

      - name: Upload Windows smoke log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-wheel-smoke-log
          path: ${{ runner.temp }}/windows-smoke.log
          if-no-files-found: warn
          retention-days: 7

  release-isolated:
    name: release-isolated (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel "setuptools>=77"

      - name: Build artifacts
        run: python -m build --no-isolation

      - name: Check release artifacts
        run: bash scripts/check_release_artifacts.sh

      - name: Run isolated release install test
        run: bash scripts/release_isolated_test.sh --cleanup
