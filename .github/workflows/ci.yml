name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Mypy
        run: python -m mypy src/ms8

      - name: Ruff
        run: python -m ruff check src/ms8

      - name: Pytest
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -q

      - name: Doctor smoke
        env:
          PYTHONPATH: src
          MS8_HOME: /tmp/ms8-ci
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED: "0"
          MS8_DOCTOR_ALLOW_DEGRADED: "1"
        run: python -m src.ms8 doctor

  package-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build

      - name: Install from wheel
        run: |
          python -m pip install dist/*.whl
          python -m ms8 version

  cleanroom-online-install:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build wheel "setuptools>=77"
          python -m build --no-isolation

      - name: Install wheel with dependencies (online clean-room)
        run: |
          TMP_BASE="$(mktemp -d)"
          python -m venv "$TMP_BASE/venv"
          "$TMP_BASE/venv/bin/python" -m pip install --upgrade pip
          "$TMP_BASE/venv/bin/python" -m pip install dist/*.whl
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" --help
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" ask "记住 cleanroom install check"
          HOME="$TMP_BASE/home" \
          MS8_HOME="$TMP_BASE/home/.ms8" \
          MS8_DATA_DIR="$TMP_BASE/home/.ms8/data" \
          MS8_CONFIG_DIR="$TMP_BASE/home/.ms8/config" \
          MS8_LOG_DIR="$TMP_BASE/home/.ms8/logs" \
          OPENCLAW_MEMORY_SESSION_INGEST_ENABLED="0" \
          MS8_DOCTOR_ALLOW_DEGRADED="1" \
          "$TMP_BASE/venv/bin/ms8" ask "cleanroom install"

  release-isolated:
    name: release-isolated (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel "setuptools>=77"

      - name: Build artifacts
        run: python -m build --no-isolation

      - name: Check release artifacts
        run: bash scripts/check_release_artifacts.sh

      - name: Run isolated release install test
        run: bash scripts/release_isolated_test.sh
