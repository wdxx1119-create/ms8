name: Static diagnostics

on:
  push:
    branches:
      - candidate/v0.2.14
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --disable-pip-version-check -q --upgrade pip
          python -m pip install --disable-pip-version-check -q -e ".[dev]"
      - name: Capture diagnostics
        shell: bash
        run: |
          set +e
          python -m mypy src/ms8 > mypy.log 2>&1
          echo $? > mypy.exitcode
          python -m ruff check src/ms8 > ruff.log 2>&1
          echo $? > ruff.exitcode
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: static-diagnostics-${{ matrix.python-version }}-${{ github.sha }}
          path: |
            mypy.log
            mypy.exitcode
            ruff.log
            ruff.exitcode
          if-no-files-found: error
          retention-days: 3
