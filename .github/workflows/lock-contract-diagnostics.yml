name: Lock contract diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  locate-lock-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate self-check lock assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          needles = ("fcntl", "check_runner", "_lock_file", "SIGKILL")
          output = []
          for path in sorted(Path("tests").rglob("*.py")):
              lines = path.read_text(encoding="utf-8").splitlines()
              matches = [
                  (number, line)
                  for number, line in enumerate(lines, start=1)
                  if any(needle in line for needle in needles)
              ]
              if matches:
                  output.append(f"FILE {path}")
                  output.extend(f"  {number}: {line}" for number, line in matches)
          Path("lock-contracts.txt").write_text("\n".join(output) + "\n", encoding="utf-8")
          PY

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: lock-contracts
          path: lock-contracts.txt
          if-no-files-found: error
          retention-days: 1
