name: Apply Phase 8 Integration Patch

on:
  push:
    branches:
      - feature/memory-hybrid-v1-macos-first
    paths:
      - .github/workflows/phase8-integration-patch.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'ci(memory): install Phase 8 patch runner'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 8 branch
        uses: actions/checkout@v4
        with:
          ref: feature/memory-hybrid-v1-macos-first
          fetch-depth: 0

      - name: Apply integration patch
        run: python scripts/phase8_integration_patch.py

      - name: Commit patched integration
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/phase8_integration_patch.py
          rm -f .github/workflows/phase8-integration-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(memory): integrate gated hybrid retrieval surfaces"
          git push origin HEAD:feature/memory-hybrid-v1-macos-first
